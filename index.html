<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue AI 1.4</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue-deep: #070c1a;
  --blue-accent: #1a6fff;
  --blue-light: #4d9fff;
  --blue-ultra: #00c3ff;
  --blue-glow: #2d7fff;
  --glass-bg: rgba(255,255,255,0.055);
  --glass-border: rgba(255,255,255,0.10);
  --text-primary: #eef2ff;
  --text-secondary: rgba(190,210,255,0.72);
  --text-muted: rgba(140,165,215,0.5);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'DM Sans',sans-serif;
  background:var(--blue-deep);
  color:var(--text-primary);
  min-height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* BG */
.bg-mesh { position:fixed;inset:0;z-index:0;overflow:hidden; }
.bg-mesh::before {
  content:'';position:absolute;
  width:900px;height:900px;
  background:radial-gradient(circle,rgba(26,111,255,.16) 0%,transparent 65%);
  top:-250px;left:-250px;
  animation:orb1 20s ease-in-out infinite;
}
.bg-mesh::after {
  content:'';position:absolute;
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(0,195,255,.1) 0%,transparent 65%);
  bottom:-150px;right:-150px;
  animation:orb2 26s ease-in-out infinite;
}
.bg-grid {
  position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(77,159,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(77,159,255,.03) 1px,transparent 1px);
  background-size:40px 40px;
}
@keyframes orb1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(140px,90px) scale(1.2)} 66%{transform:translate(-70px,180px) scale(.9)} }
@keyframes orb2 { 0%,100%{transform:translate(0,0)} 40%{transform:translate(-100px,-70px) scale(1.25)} 70%{transform:translate(50px,-140px) scale(.85)} }

/* ── AUTH SCREEN ── */
#auth-screen {
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:rgba(7,12,26,.92);
  backdrop-filter:blur(20px);
}
.auth-card {
  width:100%;max-width:420px;
  padding:40px 36px;
  border-radius:24px;
  background:rgba(14,24,55,.75);
  border:1px solid rgba(77,159,255,.18);
  box-shadow:0 32px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.07);
  backdrop-filter:blur(40px) saturate(160%);
}
.auth-logo { display:flex;align-items:center;gap:12px;margin-bottom:28px; }
.auth-logo-icon {
  width:42px;height:42px;
  background:linear-gradient(135deg,var(--blue-accent),var(--blue-ultra));
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  box-shadow:0 0 24px rgba(26,111,255,.5),inset 0 1px 0 rgba(255,255,255,.2);
}
.auth-logo-text { display:flex;flex-direction:column;line-height:1; }
.auth-logo-name {
  font-size:18px;font-weight:600;letter-spacing:-.3px;
  background:linear-gradient(90deg,#fff,var(--blue-ultra));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.auth-logo-ver { font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace;letter-spacing:1px; }
.auth-title { font-size:22px;font-weight:600;margin-bottom:6px; }
.auth-subtitle { font-size:14px;color:var(--text-secondary);margin-bottom:26px;font-weight:300; }
.auth-field { display:flex;flex-direction:column;gap:6px;margin-bottom:13px; }
.auth-field label { font-size:11.5px;color:var(--text-secondary);letter-spacing:.5px;font-weight:500; }
.auth-input {
  padding:12px 14px;border-radius:12px;
  border:1px solid rgba(77,159,255,.18);
  background:rgba(255,255,255,.04);
  color:var(--text-primary);
  font-family:'DM Sans',sans-serif;font-size:15px;
  outline:none;transition:all .2s;width:100%;
}
.auth-input:focus {
  border-color:rgba(26,111,255,.5);
  background:rgba(26,111,255,.06);
  box-shadow:0 0 0 3px rgba(26,111,255,.12);
}
.auth-input::placeholder { color:var(--text-muted); }
.auth-btn {
  width:100%;padding:13px;
  border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--blue-accent),var(--blue-glow));
  color:#fff;font-size:15px;font-weight:600;
  cursor:pointer;transition:all .2s;
  font-family:'DM Sans',sans-serif;
  box-shadow:0 6px 20px rgba(26,111,255,.4);
  margin-top:8px;
}
.auth-btn:hover:not(:disabled) { transform:translateY(-1px);box-shadow:0 10px 28px rgba(26,111,255,.55); }
.auth-btn:disabled { opacity:.5;cursor:not-allowed;transform:none; }
.auth-error { min-height:18px;font-size:13px;color:#ff7070;margin-top:10px;text-align:center; }
.auth-toggle { text-align:center;margin-top:18px;font-size:13.5px;color:var(--text-secondary); }
.auth-toggle a { color:var(--blue-light);cursor:pointer;text-decoration:none;font-weight:500; }
.auth-toggle a:hover { color:var(--blue-ultra); }

/* ── APP ── */
#app-screen { display:none;flex-direction:column;flex:1;height:100vh; }

/* Header */
header {
  position:relative;z-index:10;
  padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(7,12,26,.8);
  backdrop-filter:blur(30px);
  border-bottom:1px solid rgba(77,159,255,.1);
  flex-shrink:0;
}
.logo { display:flex;align-items:center;gap:12px; }
.logo-icon {
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--blue-accent),var(--blue-ultra));
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  box-shadow:0 0 18px rgba(26,111,255,.45),inset 0 1px 0 rgba(255,255,255,.2);
}
.logo-name {
  font-size:16px;font-weight:600;letter-spacing:-.3px;
  background:linear-gradient(90deg,#fff,var(--blue-ultra));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-ver { font-size:10px;color:var(--text-muted);font-family:'Space Mono',monospace;letter-spacing:1px; }
.header-right { display:flex;align-items:center;gap:10px; }
.status-pill {
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  font-size:12px;color:var(--text-secondary);
  background:rgba(0,255,100,.07);border:1px solid rgba(0,255,100,.18);
}
.status-dot {
  width:6px;height:6px;border-radius:50%;
  background:#00ff88;box-shadow:0 0 8px #00ff88;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 8px #00ff88} 50%{opacity:.6;box-shadow:0 0 4px #00ff88} }
.user-pill {
  display:flex;align-items:center;gap:8px;
  padding:5px 12px 5px 6px;border-radius:20px;
  background:var(--glass-bg);border:1px solid var(--glass-border);
  backdrop-filter:blur(12px);
}
.user-pill-avatar {
  width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue-accent),var(--blue-ultra));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;
}
.user-pill-name { font-size:12px;color:var(--text-secondary); }
.hdr-btn {
  padding:6px 14px;border-radius:20px;
  border:1px solid var(--glass-border);
  background:var(--glass-bg);
  color:var(--text-secondary);
  font-size:12px;cursor:pointer;transition:all .2s;
  font-family:'DM Sans',sans-serif;
  backdrop-filter:blur(10px);
}
.hdr-btn:hover { border-color:rgba(255,80,80,.4);color:#ff8080;background:rgba(255,60,60,.07); }
.hdr-btn.clear:hover { border-color:rgba(77,159,255,.4);color:var(--blue-light);background:rgba(26,111,255,.08); }

/* Main */
main { flex:1;display:flex;flex-direction:column;position:relative;z-index:5;overflow:hidden; }

/* Welcome */
#welcome-panel {
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 20px 20px;gap:24px;
  transition:opacity .4s,transform .4s;
}
#welcome-panel.hidden { opacity:0;transform:translateY(-16px);pointer-events:none;position:absolute;width:100%; }
.greeting-badge {
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:20px;
  background:rgba(26,111,255,.1);border:1px solid rgba(26,111,255,.25);
  font-size:11.5px;color:var(--blue-light);
  font-family:'Space Mono',monospace;letter-spacing:.5px;margin-bottom:16px;
}
.welcome-title {
  font-size:clamp(26px,5vw,50px);
  font-weight:300;line-height:1.15;letter-spacing:-1.5px;
  margin-bottom:10px;text-align:center;
}
.welcome-title strong {
  font-weight:600;
  background:linear-gradient(135deg,var(--blue-light),var(--blue-ultra),#fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.welcome-sub { font-size:15px;color:var(--text-secondary);font-weight:300;text-align:center; }
.quick-suggestions { display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:680px; }
.sug-btn {
  padding:9px 18px;border-radius:22px;
  border:1px solid var(--glass-border);
  background:var(--glass-bg);
  color:var(--text-secondary);font-size:13px;cursor:pointer;transition:all .2s;
  font-family:'DM Sans',sans-serif;backdrop-filter:blur(12px);
}
.sug-btn:hover { border-color:var(--blue-accent);background:rgba(26,111,255,.1);color:var(--text-primary);transform:translateY(-1px); }

/* Chat */
#chat-area {
  flex:1;overflow-y:auto;
  padding:20px max(16px,calc(50% - 390px));
  display:flex;flex-direction:column;gap:18px;
  scroll-behavior:smooth;
}
#chat-area::-webkit-scrollbar { width:3px; }
#chat-area::-webkit-scrollbar-thumb { background:rgba(77,159,255,.2);border-radius:2px; }

/* Messages */
.message { display:flex;gap:12px;align-items:flex-start; }
.message.user { flex-direction:row-reverse; }
.message.anim { animation:msgIn .32s cubic-bezier(.16,1,.3,1) both; }
@keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.msg-avatar {
  width:32px;height:32px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;margin-top:2px;
}
.msg-avatar.ai { background:linear-gradient(135deg,var(--blue-accent),var(--blue-ultra));box-shadow:0 0 14px rgba(26,111,255,.4); }
.msg-avatar.user { background:linear-gradient(135deg,rgba(77,159,255,.3),rgba(0,195,255,.2));border:1px solid var(--glass-border);font-size:13px;font-weight:700;color:var(--blue-ultra); }
.msg-bubble { max-width:78%;padding:13px 17px;border-radius:18px;line-height:1.65;font-size:15px; }
.message.user .msg-bubble {
  background:linear-gradient(135deg,rgba(26,111,255,.22),rgba(0,195,255,.13));
  border:1px solid rgba(26,111,255,.28);border-top-right-radius:4px;backdrop-filter:blur(12px);
}
.message.ai .msg-bubble {
  background:rgba(255,255,255,.048);border:1px solid rgba(255,255,255,.09);
  border-top-left-radius:4px;backdrop-filter:blur(18px);
  box-shadow:0 4px 20px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.055);
}
.msg-bubble p { margin-bottom:9px; }
.msg-bubble p:last-child { margin-bottom:0; }
.msg-bubble strong { color:var(--blue-light);font-weight:600; }
.msg-bubble em { color:var(--text-secondary); }
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { margin:12px 0 6px;color:var(--text-primary); }
.msg-bubble h2 { font-size:17px; } .msg-bubble h3 { font-size:15px; }
.msg-bubble code { font-family:'Space Mono',monospace;font-size:12.5px;background:rgba(26,111,255,.14);padding:2px 6px;border-radius:5px;color:var(--blue-ultra); }
.msg-bubble pre { background:rgba(0,0,0,.32);border:1px solid rgba(77,159,255,.14);border-radius:10px;padding:14px;margin:10px 0;overflow-x:auto; }
.msg-bubble pre code { background:none;padding:0;color:#a8d8ff;font-size:12.5px; }
.msg-bubble ul,.msg-bubble ol { padding-left:20px;margin:8px 0; }
.msg-bubble li { margin-bottom:4px; }
.msg-bubble hr { border:none;border-top:1px solid rgba(77,159,255,.14);margin:12px 0; }
.msg-meta { font-size:11px;color:var(--text-muted);margin-top:5px;font-family:'Space Mono',monospace; }
.message.user .msg-meta { text-align:right; }

/* Thinking */
.thinking { display:flex;align-items:center;gap:10px;padding:13px 17px;border-radius:18px;border-top-left-radius:4px;background:rgba(255,255,255,.048);border:1px solid rgba(255,255,255,.09);backdrop-filter:blur(16px); }
.thinking-dots { display:flex;gap:5px; }
.thinking-dot { width:7px;height:7px;border-radius:50%;background:var(--blue-accent);animation:dotP 1.4s ease-in-out infinite; }
.thinking-dot:nth-child(2){animation-delay:.2s} .thinking-dot:nth-child(3){animation-delay:.4s}
@keyframes dotP { 0%,60%,100%{transform:scale(.7);opacity:.4} 30%{transform:scale(1.1);opacity:1} }
.thinking-label { font-size:13px;color:var(--text-muted); }

/* Input */
.input-area {
  position:relative;z-index:10;
  padding:12px max(16px,calc(50% - 410px)) 18px;
  background:linear-gradient(transparent,rgba(7,12,26,.95) 28%);
  flex-shrink:0;
}
.web-mode-bar { display:none;align-items:center;gap:8px;padding:7px 16px;background:rgba(0,195,255,.06);border:1px solid rgba(0,195,255,.15);border-radius:12px;margin-bottom:8px;font-size:12px;color:var(--blue-ultra); }
.web-mode-bar.active { display:flex; }
.input-wrap {
  border-radius:20px;border:1px solid rgba(77,159,255,.2);
  background:rgba(12,20,52,.72);
  backdrop-filter:blur(30px) saturate(200%);
  box-shadow:0 0 0 1px rgba(0,0,0,.3),0 20px 55px rgba(0,0,255,.09),inset 0 1px 0 rgba(255,255,255,.07);
  transition:border-color .2s,box-shadow .2s;overflow:hidden;
}
.input-wrap:focus-within { border-color:rgba(26,111,255,.48);box-shadow:0 0 0 1px rgba(0,0,0,.3),0 20px 55px rgba(26,111,255,.18),0 0 35px rgba(26,111,255,.09),inset 0 1px 0 rgba(255,255,255,.09); }
.input-top { display:flex;align-items:flex-end;gap:10px;padding:13px 15px 9px; }
#user-input { flex:1;background:none;border:none;outline:none;color:var(--text-primary);font-family:'DM Sans',sans-serif;font-size:15.5px;font-weight:400;resize:none;max-height:160px;line-height:1.5;min-height:26px; }
#user-input::placeholder { color:var(--text-muted); }
.send-btn { width:36px;height:36px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--blue-accent),var(--blue-glow));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0;box-shadow:0 4px 14px rgba(26,111,255,.4); }
.send-btn:hover:not(:disabled) { transform:scale(1.06);box-shadow:0 6px 20px rgba(26,111,255,.6); }
.send-btn:disabled { opacity:.35;cursor:not-allowed;transform:none; }
.input-bottom { display:flex;align-items:center;justify-content:space-between;padding:4px 15px 11px; }
.input-tools { display:flex;gap:3px; }
.tool-btn { padding:5px 10px;border-radius:8px;border:none;background:transparent;color:var(--text-muted);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif; }
.tool-btn:hover { background:rgba(255,255,255,.05);color:var(--text-secondary); }
.tool-btn.active { background:rgba(26,111,255,.13);color:var(--blue-light);border:1px solid rgba(26,111,255,.22); }
.char-count { font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace; }
.char-count.warn { color:#ff9500; } .char-count.limit { color:#ff3b30; }

/* Search progress */
.search-progress { display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:11px;background:rgba(0,195,255,.06);border:1px solid rgba(0,195,255,.14);font-size:13px;color:var(--blue-ultra);margin-bottom:8px;animation:fadeIn .3s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.search-spinner { width:13px;height:13px;border:2px solid rgba(0,195,255,.3);border-top-color:var(--blue-ultra);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0; }
@keyframes spin { to{transform:rotate(360deg)} }

@media(max-width:580px){
  .quick-suggestions{gap:8px} .sug-btn{font-size:12px;padding:8px 14px}
  header{padding:12px 16px} .auth-card{margin:16px;padding:30px 22px}
}
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="bg-grid"></div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">✦</div>
      <div class="auth-logo-text">
        <span class="auth-logo-name">Blue AI</span>
        <span class="auth-logo-ver">v1.4</span>
      </div>
    </div>
    <h2 class="auth-title" id="auth-title">Create Account</h2>
    <p class="auth-subtitle">Your intelligent AI assistant</p>

    <div class="auth-field" id="username-row">
      <label>USERNAME</label>
      <input class="auth-input" id="auth-username" type="text" placeholder="Choose a username" autocomplete="nickname" />
    </div>
    <div class="auth-field">
      <label>EMAIL</label>
      <input class="auth-input" id="auth-email" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="auth-field">
      <label>PASSWORD</label>
      <input class="auth-input" id="auth-password" type="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')submitAuth()" />
    </div>
    <p class="auth-error" id="auth-error"></p>
    <button class="auth-btn" id="auth-btn" onclick="submitAuth()">Create Account</button>
    <p class="auth-toggle">
      <span id="auth-toggle-text">Already have an account?</span>
      <a onclick="toggleMode()"> <span id="auth-toggle-link">Sign in</span></a>
    </p>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div>
        <div class="logo-name">Blue AI</div>
        <div class="logo-ver">v1.4</div>
      </div>
    </div>
    <div class="header-right">
      <div class="status-pill"><div class="status-dot"></div>Online</div>
      <div class="user-pill">
        <div class="user-pill-avatar" id="avatar-header">?</div>
        <span class="user-pill-name" id="username-header">User</span>
      </div>
      <button class="hdr-btn clear" onclick="clearChat()">Clear</button>
      <button class="hdr-btn" onclick="doLogout()">Sign out</button>
    </div>
  </header>

  <main>
    <div id="welcome-panel">
      <div>
        <div class="greeting-badge">✦ BLUE AI 1.4</div>
        <h1 class="welcome-title">Hey <span id="greeting-name">there</span>,<br><strong>what can I do for you today?</strong></h1>
        <p class="welcome-sub">Ask me anything — I'm here to help.</p>
      </div>
      <div class="quick-suggestions">
        <button class="sug-btn" onclick="useSuggestion('What are the latest AI news today?')">🌐 Latest AI news</button>
        <button class="sug-btn" onclick="useSuggestion('Write a Python function to sort a list by multiple keys')">💻 Python sorting</button>
        <button class="sug-btn" onclick="useSuggestion('Explain quantum computing in simple terms')">🔬 Quantum computing</button>
        <button class="sug-btn" onclick="useSuggestion('Help me write a professional email declining a meeting')">✍️ Draft an email</button>
        <button class="sug-btn" onclick="useSuggestion('What is the difference between machine learning and deep learning?')">🧠 ML vs Deep Learning</button>
        <button class="sug-btn" onclick="useSuggestion('Give me 5 productivity tips for developers')">⚡ Dev tips</button>
      </div>
    </div>
    <div id="chat-area"></div>
  </main>

  <div class="input-area">
    <div class="web-mode-bar" id="web-mode-bar">🌐 Web Search on — I'll look up current information for you</div>
    <div class="input-wrap">
      <div class="input-top">
        <textarea id="user-input" placeholder="Ask anything…" rows="1"
          onkeydown="handleKey(event)" oninput="onInput(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button>
      </div>
      <div class="input-bottom">
        <div class="input-tools">
          <button class="tool-btn" id="web-btn" onclick="toggleWeb()">🌐 Web</button>
        </div>
        <span class="char-count" id="char-count">0 / 4000</span>
      </div>
    </div>
  </div>
</div>

<!-- Firebase + App logic -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
         onAuthStateChanged, signOut, updateProfile }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getDatabase, ref, set, get, push }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

// ── Config ──────────────────────────────────────────────────
const fbApp = initializeApp({
  apiKey: "AIzaSyDVTzNgheVWiI13uQOYmAm0Gm_fB_bkR8w",
  authDomain: "blueai-fee62.firebaseapp.com",
  projectId: "blueai-fee62",
  storageBucket: "blueai-fee62.firebasestorage.app",
  messagingSenderId: "965285145335",
  appId: "1:965285145335:web:0cc41cd849e363d517c1f2",
  databaseURL: "https://blueai-fee62-default-rtdb.firebaseio.com"
});
const auth = getAuth(fbApp);
const db   = getDatabase(fbApp);

const GEMINI_KEY = "AIzaSyBe0jiUa3KuDEO4fUpBtPeFmH-qp9oLWyM";
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;

// ── State ───────────────────────────────────────────────────
let currentUser  = null;
let history      = [];   // Gemini-format [{role,parts}]
let isTyping     = false;
let webOn        = false;
let isRegister   = true;
let chatStarted  = false;

// ── Auth state ──────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  currentUser = user;
  if (user) {
    bootApp(user);
    await loadHistory(user.uid);
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display  = 'none';
  }
});

function bootApp(user) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display  = 'flex';
  const name = user.displayName || user.email.split('@')[0];
  document.getElementById('greeting-name').textContent  = name;
  document.getElementById('username-header').textContent = name;
  document.getElementById('avatar-header').textContent  = name.charAt(0).toUpperCase();
}

// ── Toggle auth mode ────────────────────────────────────────
window.toggleMode = () => {
  isRegister = !isRegister;
  document.getElementById('auth-title').textContent         = isRegister ? 'Create Account' : 'Welcome back';
  document.getElementById('auth-btn').textContent           = isRegister ? 'Create Account' : 'Sign In';
  document.getElementById('auth-toggle-text').textContent   = isRegister ? 'Already have an account?' : "Don't have an account?";
  document.getElementById('auth-toggle-link').textContent   = isRegister ? 'Sign in' : 'Create one';
  document.getElementById('username-row').style.display     = isRegister ? 'flex' : 'none';
  document.getElementById('auth-error').textContent = '';
};

// ── Submit auth ─────────────────────────────────────────────
window.submitAuth = async () => {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-password').value;
  const name  = document.getElementById('auth-username').value.trim();
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';

  if (!email || !pass) { errEl.textContent = 'Please fill all fields.'; return; }
  if (isRegister && !name) { errEl.textContent = 'Please enter a username.'; return; }
  if (isRegister && pass.length < 6) { errEl.textContent = 'Password needs at least 6 characters.'; return; }

  const btn = document.getElementById('auth-btn');
  btn.disabled = true; btn.textContent = 'Please wait…';

  try {
    if (isRegister) {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await set(ref(db, `users/${cred.user.uid}/profile`), { username: name, email, createdAt: Date.now() });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch (e) {
    errEl.textContent = fmtErr(e.code);
    btn.disabled = false;
    btn.textContent = isRegister ? 'Create Account' : 'Sign In';
  }
};

function fmtErr(code) {
  return ({
    'auth/invalid-email':'Invalid email.',
    'auth/user-not-found':'No account with this email.',
    'auth/wrong-password':'Incorrect password.',
    'auth/email-already-in-use':'Email already registered.',
    'auth/weak-password':'Password too weak.',
    'auth/invalid-credential':'Wrong email or password.',
    'auth/too-many-requests':'Too many attempts. Try later.',
    'auth/network-request-failed':'Network error.'
  })[code] || 'Something went wrong. Try again.';
}

// ── Logout ──────────────────────────────────────────────────
window.doLogout = async () => {
  history = [];
  chatStarted = false;
  document.getElementById('chat-area').innerHTML = '';
  resetWelcome();
  await signOut(auth);
};

// ── Firebase: save / load chat ──────────────────────────────
function saveMsg(role, content) {
  if (!currentUser) return;
  push(ref(db, `users/${currentUser.uid}/chats`), { role, content, ts: Date.now() });
}

async function loadHistory(uid) {
  const snap = await get(ref(db, `users/${uid}/chats`));
  if (!snap.exists()) return;
  const entries = Object.values(snap.val()).sort((a,b) => a.ts - b.ts).slice(-40);
  history = [];
  document.getElementById('chat-area').innerHTML = '';
  for (const e of entries) {
    history.push({ role: e.role === 'ai' ? 'model' : 'user', parts: [{ text: e.content }] });
    renderMsg(e.role, e.content, false);
  }
  if (entries.length > 0) { showChat(); scrollBottom(); }
}

// ── Clear chat ──────────────────────────────────────────────
window.clearChat = () => {
  history = [];
  chatStarted = false;
  document.getElementById('chat-area').innerHTML = '';
  resetWelcome();
  if (currentUser) set(ref(db, `users/${currentUser.uid}/chats`), null);
};

// ── Toggle web search ────────────────────────────────────────
window.toggleWeb = () => {
  webOn = !webOn;
  document.getElementById('web-btn').classList.toggle('active', webOn);
  document.getElementById('web-mode-bar').classList.toggle('active', webOn);
};

// ── Send message ─────────────────────────────────────────────
window.sendMessage = async () => {
  const inp  = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text || isTyping) return;

  isTyping = true;
  document.getElementById('send-btn').disabled = true;
  inp.value = '';
  inp.style.height = 'auto';
  updateCC(inp);

  showChat();
  renderMsg('user', text);
  saveMsg('user', text);

  // Should we search the web?
  const needsSearch = webOn || /news|today|current|latest|2025|2026|weather|price|stock|who is|what happened/i.test(text);
  let webCtx = '';
  if (needsSearch) webCtx = await webSearch(text);

  const thinkDiv = appendThinking();

  // Complex vs simple routing
  const complex = text.length > 80 ||
    /explain|how does|difference|compare|analyz|write a|code|debug|research|summar|step by step|in detail|pros and cons/i.test(text);

  let reply = '';
  try {
    reply = await callGemini(text, webCtx, complex);
  } catch (e) {
    reply = `⚠️ **Error:** ${e.message}`;
  }

  thinkDiv.remove();
  renderMsg('ai', reply);
  saveMsg('ai', reply);

  const userPart = webCtx ? text + '\n\n[Web context:\n' + webCtx + ']' : text;
  history.push({ role: 'user',  parts: [{ text: userPart }] });
  history.push({ role: 'model', parts: [{ text: reply }]   });
  if (history.length > 40) history = history.slice(-40);

  isTyping = false;
  document.getElementById('send-btn').disabled = false;
  inp.focus();
};

// ── Gemini call ──────────────────────────────────────────────
async function callGemini(userText, webCtx, complex) {
  const sysPrompt = `You are Blue AI 1.4 — an advanced, friendly, highly capable AI assistant. Be helpful, accurate, and clear. Use markdown formatting naturally (headers, **bold**, \`code\`, lists). Today: ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}.`;
  const fullText  = webCtx ? userText + '\n\n[Web search context:\n' + webCtx + ']' : userText;
  const ctxSlice  = complex ? history : history.slice(-6);

  const body = {
    system_instruction: { parts: [{ text: sysPrompt }] },
    contents: [...ctxSlice, { role: 'user', parts: [{ text: fullText }] }],
    generationConfig: { temperature: complex ? 0.75 : 0.6, maxOutputTokens: complex ? 2048 : 600 }
  };

  const res  = await fetch(GEMINI_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response received.';
}

// ── Web search via Gemini grounding ──────────────────────────
async function webSearch(query) {
  const searchDiv = document.createElement('div');
  searchDiv.className = 'search-progress';
  searchDiv.innerHTML = `<div class="search-spinner"></div> Searching the web…`;
  document.getElementById('chat-area').appendChild(searchDiv);
  scrollBottom();
  try {
    const res = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ role:'user', parts:[{ text:`Find current information about: ${query}\nSummarize the most relevant findings in under 250 words.` }] }],
        tools: [{ google_search: {} }],
        generationConfig: { temperature: 0.2, maxOutputTokens: 400 }
      })
    });
    const data = await res.json();
    searchDiv.remove();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  } catch { searchDiv.remove(); return ''; }
}

// ── Render message ───────────────────────────────────────────
function renderMsg(role, content, animate = true) {
  const ca   = document.getElementById('chat-area');
  const div  = document.createElement('div');
  div.className = `message ${role}${animate ? ' anim' : ''}`;
  const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const ava  = role === 'ai'
    ? `<div class="msg-avatar ai">✦</div>`
    : `<div class="msg-avatar user">${currentUser?.displayName?.charAt(0).toUpperCase() || '?'}</div>`;
  const bbl  = `<div class="msg-bubble">${role === 'ai' ? md(content) : esc(content)}</div>`;
  div.innerHTML = `${ava}<div>${bbl}<div class="msg-meta">${time}</div></div>`;
  ca.appendChild(div);
  scrollBottom();
}

function appendThinking() {
  const ca  = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.innerHTML = `<div class="msg-avatar ai">✦</div><div class="thinking"><div class="thinking-dots"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div></div><span class="thinking-label">Thinking…</span></div>`;
  ca.appendChild(div);
  scrollBottom();
  return div;
}

function showChat() {
  if (chatStarted) return;
  chatStarted = true;
  const wp = document.getElementById('welcome-panel');
  wp.classList.add('hidden');
  setTimeout(() => { wp.style.display = 'none'; }, 420);
}

function resetWelcome() {
  const wp = document.getElementById('welcome-panel');
  wp.style.display = 'flex';
  setTimeout(() => wp.classList.remove('hidden'), 10);
}

function scrollBottom() {
  const ca = document.getElementById('chat-area');
  ca.scrollTop = ca.scrollHeight;
}

// ── Markdown ─────────────────────────────────────────────────
function md(t) {
  let h = t;
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_,l,c) => `<pre><code>${esc(c.trim())}</code></pre>`);
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g,    '<em>$1</em>');
  h = h.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/^\d+\. (.+)$/gm,  '<li>$1</li>');
  h = h.replace(/^---$/gm, '<hr>');
  h = h.split('\n\n').map(p => { p=p.trim(); if(!p||p.startsWith('<'))return p; return `<p>${p.replace(/\n/g,'<br>')}</p>`; }).join('');
  return h;
}
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Input helpers (exposed globally) ────────────────────────
window.handleKey = e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} };
window.onInput   = el => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,160)+'px'; updateCC(el); };
window.useSuggestion = text => { const i=document.getElementById('user-input'); i.value=text; window.onInput(i); sendMessage(); };
function updateCC(el) {
  const n = el.value.length;
  const cc = document.getElementById('char-count');
  cc.textContent = `${n} / 4000`;
  cc.className = 'char-count'+(n>3600?' warn':'')+(n>=4000?' limit':'');
  document.getElementById('send-btn').disabled = n===0 || isTyping;
}
</script>
