<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue AI 1.4</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue-deep: #070c1a;
  --blue-accent: #1a6fff;
  --blue-light: #4d9fff;
  --blue-ultra: #00c3ff;
  --blue-glow: #2d7fff;
  --glass-bg: rgba(255,255,255,0.055);
  --glass-border: rgba(255,255,255,0.10);
  --text-primary: #eef2ff;
  --text-secondary: rgba(190,210,255,0.72);
  --text-muted: rgba(140,165,215,0.5);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:'DM Sans',sans-serif;
  background:var(--blue-deep);
  color:var(--text-primary);
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

/* BG effects */
.bg-mesh { position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none; }
.bg-mesh::before {
  content:'';position:absolute;
  width:900px;height:900px;
  background:radial-gradient(circle,rgba(26,111,255,.15) 0%,transparent 65%);
  top:-250px;left:-250px;
  animation:orb1 22s ease-in-out infinite;
}
.bg-mesh::after {
  content:'';position:absolute;
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(0,195,255,.09) 0%,transparent 65%);
  bottom:-150px;right:-150px;
  animation:orb2 28s ease-in-out infinite;
}
.bg-grid {
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(77,159,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(77,159,255,.025) 1px,transparent 1px);
  background-size:40px 40px;
}
@keyframes orb1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(130px,80px) scale(1.15)} 66%{transform:translate(-60px,160px) scale(.92)} }
@keyframes orb2 { 0%,100%{transform:translate(0,0)} 40%{transform:translate(-90px,-60px) scale(1.2)} 70%{transform:translate(45px,-120px) scale(.88)} }

/* ── AUTH SCREEN ─────────────────────────────────────────── */
#auth-screen {
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;
  background:rgba(7,12,26,.94);
  backdrop-filter:blur(24px);
}
.auth-card {
  width:100%;max-width:420px;
  padding:42px 38px;
  border-radius:26px;
  background:rgba(12,22,52,.78);
  border:1px solid rgba(77,159,255,.16);
  box-shadow:0 36px 90px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.065);
  backdrop-filter:blur(44px) saturate(170%);
}
.auth-logo { display:flex;align-items:center;gap:13px;margin-bottom:30px; }
.auth-logo-icon {
  width:44px;height:44px;
  background:linear-gradient(135deg,var(--blue-accent),var(--blue-ultra));
  border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-size:21px;
  box-shadow:0 0 26px rgba(26,111,255,.52),inset 0 1px 0 rgba(255,255,255,.22);
}
.auth-logo-name {
  font-size:19px;font-weight:600;letter-spacing:-.3px;
  background:linear-gradient(90deg,#fff,var(--blue-ultra));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.auth-logo-ver { font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace;letter-spacing:1px;margin-top:1px; }
.auth-heading { font-size:23px;font-weight:600;margin-bottom:6px; }
.auth-sub { font-size:14px;color:var(--text-secondary);margin-bottom:28px;font-weight:300; }
.auth-field { display:flex;flex-direction:column;gap:6px;margin-bottom:14px; }
.auth-field label { font-size:11px;color:var(--text-secondary);letter-spacing:.6px;font-weight:600;text-transform:uppercase; }
.auth-input {
  padding:12px 15px;border-radius:13px;
  border:1px solid rgba(77,159,255,.16);
  background:rgba(255,255,255,.038);
  color:var(--text-primary);
  font-family:'DM Sans',sans-serif;font-size:15px;
  outline:none;transition:all .2s;width:100%;
}
.auth-input:focus { border-color:rgba(26,111,255,.52);background:rgba(26,111,255,.065);box-shadow:0 0 0 3px rgba(26,111,255,.13); }
.auth-input::placeholder { color:var(--text-muted); }
.auth-btn {
  width:100%;padding:14px;
  border-radius:15px;border:none;
  background:linear-gradient(135deg,var(--blue-accent),var(--blue-glow));
  color:#fff;font-size:15px;font-weight:600;
  cursor:pointer;transition:all .22s;
  font-family:'DM Sans',sans-serif;
  box-shadow:0 7px 22px rgba(26,111,255,.42);
  margin-top:6px;
}
.auth-btn:hover:not(:disabled) { transform:translateY(-2px);box-shadow:0 12px 30px rgba(26,111,255,.58); }
.auth-btn:active:not(:disabled) { transform:translateY(0); }
.auth-btn:disabled { opacity:.48;cursor:not-allowed;transform:none; }
.auth-err { min-height:18px;font-size:13px;color:#ff7878;margin-top:10px;text-align:center; }
.auth-toggle { text-align:center;margin-top:20px;font-size:13.5px;color:var(--text-secondary); }
.auth-toggle a { color:var(--blue-light);cursor:pointer;font-weight:500;text-decoration:none; }
.auth-toggle a:hover { color:var(--blue-ultra); }

/* ── APP SCREEN ──────────────────────────────────────────── */
#app-screen {
  display:none;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
  position:relative;
  z-index:1;
}

/* Header */
header {
  flex-shrink:0;
  z-index:10;
  padding:13px 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(7,12,26,.82);
  backdrop-filter:blur(32px);
  border-bottom:1px solid rgba(77,159,255,.09);
}
.logo { display:flex;align-items:center;gap:12px; }
.logo-icon {
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--blue-accent),var(--blue-ultra));
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  box-shadow:0 0 18px rgba(26,111,255,.44),inset 0 1px 0 rgba(255,255,255,.2);
}
.logo-name {
  font-size:16px;font-weight:600;letter-spacing:-.3px;
  background:linear-gradient(90deg,#fff,var(--blue-ultra));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.2;
}
.logo-ver { font-size:10px;color:var(--text-muted);font-family:'Space Mono',monospace;letter-spacing:1px; }
.hdr-right { display:flex;align-items:center;gap:10px; }
.status-pill {
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  font-size:12px;color:var(--text-secondary);
  background:rgba(0,255,100,.065);border:1px solid rgba(0,255,100,.16);
}
.status-dot {
  width:6px;height:6px;border-radius:50%;
  background:#00ff88;box-shadow:0 0 8px #00ff88;
  animation:pulse 2.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 8px #00ff88} 50%{opacity:.55;box-shadow:0 0 4px #00ff88} }
.user-chip {
  display:flex;align-items:center;gap:8px;
  padding:4px 12px 4px 5px;border-radius:20px;
  background:var(--glass-bg);border:1px solid var(--glass-border);
  backdrop-filter:blur(14px);
}
.user-avatar {
  width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue-accent),var(--blue-ultra));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;
}
.user-name { font-size:12px;color:var(--text-secondary); }
.hdr-btn {
  padding:6px 14px;border-radius:20px;
  border:1px solid var(--glass-border);
  background:var(--glass-bg);
  color:var(--text-secondary);font-size:12px;cursor:pointer;
  transition:all .2s;font-family:'DM Sans',sans-serif;
  backdrop-filter:blur(12px);
}
.hdr-btn:hover { border-color:rgba(255,80,80,.38);color:#ff8888;background:rgba(255,50,50,.07); }
.hdr-btn.clr:hover { border-color:rgba(77,159,255,.4);color:var(--blue-light);background:rgba(26,111,255,.08); }

/* ── MAIN CONTENT AREA ───────────────────────────────────── */
main {
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* Welcome */
#welcome-panel {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  gap:10px;
  transition:opacity .38s ease, transform .38s ease;
  pointer-events:auto;
}
#welcome-panel.hidden {
  opacity:0;
  transform:translateY(-14px);
  pointer-events:none;
}
.greet-badge {
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:20px;
  background:rgba(26,111,255,.09);border:1px solid rgba(26,111,255,.22);
  font-size:11px;color:var(--blue-light);
  font-family:'Space Mono',monospace;letter-spacing:.6px;
  margin-bottom:14px;
}
.welcome-h {
  font-size:clamp(24px,4.5vw,48px);
  font-weight:300;line-height:1.18;letter-spacing:-1.2px;
  text-align:center;margin-bottom:10px;
}
.welcome-h strong {
  font-weight:600;
  background:linear-gradient(135deg,var(--blue-light),var(--blue-ultra),#fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.welcome-sub { font-size:14.5px;color:var(--text-secondary);font-weight:300;text-align:center; }

/* ── CHAT SCROLL CONTAINER ───────────────────────────────── */
#chat-scroll {
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  scroll-behavior:smooth;
  /* custom scrollbar */
  scrollbar-width:thin;
  scrollbar-color:rgba(77,159,255,.22) transparent;
}
#chat-scroll::-webkit-scrollbar { width:4px; }
#chat-scroll::-webkit-scrollbar-track { background:transparent; }
#chat-scroll::-webkit-scrollbar-thumb { background:rgba(77,159,255,.22);border-radius:4px; }
#chat-scroll::-webkit-scrollbar-thumb:hover { background:rgba(77,159,255,.38); }

#chat-area {
  display:flex;
  flex-direction:column;
  gap:18px;
  padding:22px max(16px,calc(50% - 400px)) 10px;
  min-height:100%;
}

/* Scroll to bottom button */
#scroll-btn {
  position:absolute;
  bottom:14px;
  right:max(20px,calc(50% - 420px));
  width:34px;height:34px;
  border-radius:50%;
  background:rgba(26,111,255,.7);
  border:1px solid rgba(77,159,255,.35);
  color:#fff;font-size:16px;
  cursor:pointer;
  display:none;
  align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(26,111,255,.4);
  transition:opacity .2s,transform .2s;
  z-index:20;
  backdrop-filter:blur(10px);
}
#scroll-btn:hover { transform:scale(1.1); }
#scroll-btn.visible { display:flex; }

/* Messages */
.message { display:flex;gap:12px;align-items:flex-start; }
.message.user { flex-direction:row-reverse; }
.msg-anim { animation:msgIn .3s cubic-bezier(.16,1,.3,1) both; }
@keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.msg-avatar {
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;margin-top:2px;
}
.msg-avatar.ai { background:linear-gradient(135deg,var(--blue-accent),var(--blue-ultra));box-shadow:0 0 14px rgba(26,111,255,.38); }
.msg-avatar.user { background:rgba(255,255,255,.1);border:1px solid var(--glass-border);font-size:13px;font-weight:700;color:var(--blue-ultra); }

.msg-bubble { max-width:78%;padding:13px 17px;border-radius:18px;line-height:1.68;font-size:15px; }
.message.user .msg-bubble {
  background:linear-gradient(135deg,rgba(26,111,255,.22),rgba(0,195,255,.12));
  border:1px solid rgba(26,111,255,.26);
  border-top-right-radius:4px;
  backdrop-filter:blur(12px);
}
.message.ai .msg-bubble {
  background:rgba(255,255,255,.046);
  border:1px solid rgba(255,255,255,.088);
  border-top-left-radius:4px;
  backdrop-filter:blur(20px);
  box-shadow:0 4px 22px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.052);
}
.msg-bubble p { margin-bottom:9px; }
.msg-bubble p:last-child { margin-bottom:0; }
.msg-bubble strong { color:var(--blue-light);font-weight:600; }
.msg-bubble em { color:var(--text-secondary); }
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { margin:13px 0 7px;color:var(--text-primary); }
.msg-bubble h2 { font-size:17px; } .msg-bubble h3 { font-size:15px; }
.msg-bubble code {
  font-family:'Space Mono',monospace;font-size:12.5px;
  background:rgba(26,111,255,.14);padding:2px 7px;border-radius:5px;color:var(--blue-ultra);
}
.msg-bubble pre {
  background:rgba(0,0,0,.32);border:1px solid rgba(77,159,255,.13);
  border-radius:11px;padding:15px;margin:11px 0;overflow-x:auto;
}
.msg-bubble pre code { background:none;padding:0;color:#a8d8ff;font-size:12.5px; }
.msg-bubble ul,.msg-bubble ol { padding-left:22px;margin:8px 0; }
.msg-bubble li { margin-bottom:5px; }
.msg-bubble hr { border:none;border-top:1px solid rgba(77,159,255,.13);margin:13px 0; }
.msg-bubble a { color:var(--blue-ultra);text-decoration:none; }
.msg-bubble a:hover { text-decoration:underline; }
.msg-meta { font-size:11px;color:var(--text-muted);margin-top:5px;font-family:'Space Mono',monospace; }
.message.user .msg-meta { text-align:right; }

/* Thinking indicator */
.thinking {
  display:flex;align-items:center;gap:10px;
  padding:13px 17px;
  border-radius:18px;border-top-left-radius:4px;
  background:rgba(255,255,255,.046);
  border:1px solid rgba(255,255,255,.088);
  backdrop-filter:blur(20px);
}
.th-dots { display:flex;gap:5px; }
.th-dot { width:7px;height:7px;border-radius:50%;background:var(--blue-accent);animation:dotP 1.4s ease-in-out infinite; }
.th-dot:nth-child(2){animation-delay:.18s} .th-dot:nth-child(3){animation-delay:.36s}
@keyframes dotP { 0%,60%,100%{transform:scale(.68);opacity:.38} 30%{transform:scale(1.08);opacity:1} }
.th-label { font-size:13px;color:var(--text-muted); }

/* Search progress */
.srch-bar {
  display:flex;align-items:center;gap:9px;
  padding:9px 14px;border-radius:11px;
  background:rgba(0,195,255,.055);border:1px solid rgba(0,195,255,.13);
  font-size:13px;color:var(--blue-ultra);
  animation:fadeUp .3s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.srch-spin {
  width:13px;height:13px;border:2px solid rgba(0,195,255,.28);
  border-top-color:var(--blue-ultra);border-radius:50%;
  animation:spin .8s linear infinite;flex-shrink:0;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* ── INPUT AREA ──────────────────────────────────────────── */
.input-area {
  flex-shrink:0;
  position:relative;
  z-index:10;
  padding:10px max(16px,calc(50% - 416px)) 18px;
  background:linear-gradient(transparent,rgba(7,12,26,.97) 30%);
}
.web-bar {
  display:none;align-items:center;gap:8px;
  padding:7px 14px;
  background:rgba(0,195,255,.055);border:1px solid rgba(0,195,255,.14);
  border-radius:11px;margin-bottom:8px;
  font-size:12px;color:var(--blue-ultra);
}
.web-bar.on { display:flex; }
.input-box {
  border-radius:20px;
  border:1px solid rgba(77,159,255,.18);
  background:rgba(10,18,50,.74);
  backdrop-filter:blur(32px) saturate(200%);
  box-shadow:0 0 0 1px rgba(0,0,0,.28),0 22px 58px rgba(0,0,255,.08),inset 0 1px 0 rgba(255,255,255,.065);
  transition:border-color .22s,box-shadow .22s;
  overflow:hidden;
}
.input-box:focus-within {
  border-color:rgba(26,111,255,.46);
  box-shadow:0 0 0 1px rgba(0,0,0,.28),0 22px 58px rgba(26,111,255,.17),0 0 38px rgba(26,111,255,.09),inset 0 1px 0 rgba(255,255,255,.088);
}
.input-top { display:flex;align-items:flex-end;gap:10px;padding:14px 15px 9px; }
#user-input {
  flex:1;background:none;border:none;outline:none;
  color:var(--text-primary);font-family:'DM Sans',sans-serif;
  font-size:15.5px;font-weight:400;
  resize:none;max-height:180px;line-height:1.52;min-height:27px;
}
#user-input::placeholder { color:var(--text-muted); }
.send-btn {
  width:37px;height:37px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--blue-accent),var(--blue-glow));
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .2s;flex-shrink:0;
  box-shadow:0 4px 15px rgba(26,111,255,.42);
}
.send-btn:hover:not(:disabled) { transform:scale(1.07);box-shadow:0 6px 22px rgba(26,111,255,.62); }
.send-btn:disabled { opacity:.32;cursor:not-allowed;transform:none; }
.input-bot { display:flex;align-items:center;justify-content:space-between;padding:3px 15px 12px; }
.i-tools { display:flex;gap:3px; }
.tool-btn {
  padding:5px 11px;border-radius:8px;border:none;
  background:transparent;color:var(--text-muted);font-size:12px;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:4px;
  font-family:'DM Sans',sans-serif;
}
.tool-btn:hover { background:rgba(255,255,255,.05);color:var(--text-secondary); }
.tool-btn.on { background:rgba(26,111,255,.12);color:var(--blue-light);border:1px solid rgba(26,111,255,.22); }
.char-c { font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace; }
.char-c.warn{color:#ff9500} .char-c.over{color:#ff4040}

@media(max-width:600px){
  header{padding:11px 14px}
  .input-area{padding:10px 12px 16px}
  .msg-bubble{max-width:90%;font-size:14.5px}
}
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="bg-grid"></div>

<!-- ═══ AUTH SCREEN ══════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">✦</div>
      <div>
        <div class="auth-logo-name">Blue AI</div>
        <div class="auth-logo-ver">v1.4</div>
      </div>
    </div>
    <h2 class="auth-heading" id="auth-heading">Create Account</h2>
    <p class="auth-sub">Your personal AI assistant</p>

    <div class="auth-field" id="uname-row">
      <label>Username</label>
      <input class="auth-input" id="f-uname" type="text" placeholder="Choose a username" autocomplete="off" />
    </div>
    <div class="auth-field">
      <label>Email</label>
      <input class="auth-input" id="f-email" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input class="auth-input" id="f-pass" type="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')submitAuth()" />
    </div>
    <p class="auth-err" id="auth-err"></p>
    <button class="auth-btn" id="auth-btn" onclick="submitAuth()">Create Account</button>
    <p class="auth-toggle">
      <span id="tog-txt">Already have an account?</span>
      <a onclick="toggleMode()" id="tog-lnk"> Sign in</a>
    </p>
  </div>
</div>

<!-- ═══ APP SCREEN ════════════════════════════════════════════ -->
<div id="app-screen">
  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div>
        <div class="logo-name">Blue AI</div>
        <div class="logo-ver">v1.4</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="status-pill"><div class="status-dot"></div>Online</div>
      <div class="user-chip">
        <div class="user-avatar" id="u-avatar">?</div>
        <span class="user-name" id="u-name">User</span>
      </div>
      <button class="hdr-btn clr" onclick="clearChat()">Clear</button>
      <button class="hdr-btn" onclick="doLogout()">Sign out</button>
    </div>
  </header>

  <main>
    <!-- Welcome -->
    <div id="welcome-panel">
      <div class="greet-badge">✦ BLUE AI 1.4</div>
      <h1 class="welcome-h">Hey <span id="greet-name">there</span>,<br><strong>what can I do for you today?</strong></h1>
      <p class="welcome-sub">Ask me anything.</p>
    </div>

    <!-- Chat scroll wrapper -->
    <div id="chat-scroll">
      <div id="chat-area"></div>
    </div>

    <!-- Scroll-to-bottom button -->
    <button id="scroll-btn" onclick="scrollToBottom(true)" title="Scroll to bottom">↓</button>
  </main>

  <!-- Input -->
  <div class="input-area">
    <div class="web-bar" id="web-bar">🌐 Web Search on — searching for current info</div>
    <div class="input-box">
      <div class="input-top">
        <textarea id="user-input" rows="1" placeholder="Ask anything…"
          onkeydown="handleKey(event)"
          oninput="onInput(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button>
      </div>
      <div class="input-bot">
        <div class="i-tools">
          <button class="tool-btn" id="web-btn" onclick="toggleWeb()">🌐 Web</button>
        </div>
        <span class="char-c" id="char-c">0 / 4000</span>
      </div>
    </div>
  </div>
</div>

<!-- ═══ FIREBASE + APP LOGIC ══════════════════════════════════ -->
<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
         onAuthStateChanged, signOut, updateProfile }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getDatabase, ref, set, get, push }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

/* ── Firebase init ──────────────────────────────────────── */
const fbApp = initializeApp({
  apiKey: "AIzaSyDVTzNgheVWiI13uQOYmAm0Gm_fB_bkR8w",
  authDomain: "blueai-fee62.firebaseapp.com",
  projectId: "blueai-fee62",
  storageBucket: "blueai-fee62.firebasestorage.app",
  messagingSenderId: "965285145335",
  appId: "1:965285145335:web:0cc41cd849e363d517c1f2",
  databaseURL: "https://blueai-fee62-default-rtdb.firebaseio.com"
});
const auth = getAuth(fbApp);
const db   = getDatabase(fbApp);

/* ── Gemini config ──────────────────────────────────────── */
const G_KEY = "AIzaSyBLNuDYTWyyzP5Q_ub7nJVSYDYg43Vc_Sw";
const G_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${G_KEY}`;

/* ── State ──────────────────────────────────────────────── */
let currentUser = null;
let history     = [];
let isTyping    = false;
let webOn       = false;
let isReg       = true;
let chatActive  = false;

/* ── Send message ───────────────────────────────────────── */
window.sendMessage = async () => {
  const inp  = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text || isTyping) return;

  isTyping = true;
  document.getElementById('send-btn').disabled = true;
  inp.value = ''; inp.style.height = 'auto'; updateCC(inp);

  showChat();
  renderMsg('user', text);
  saveMsg('user', text);

  const thinkEl = appendThinking();
  let reply = '';
  let webCtx = '';

  try {
    const needsWeb = webOn || /news|today|current|latest|2025|2026|weather|price|stock|who won|just happened/i.test(text);
    if (needsWeb) {
      thinkEl.querySelector('.th-label').textContent = 'Searching…';
      webCtx = await doWebSearch(text);
    }
    const isComplex = text.length > 60 ||
      /explain|how does|difference|compare|analyz|write|code|debug|research|summar|step by step|in detail|pros|cons|why|when|who is|what happened|history/i.test(text);
    reply = await callGemini(text, webCtx, isComplex);
  } catch(e) {
    reply = 'Something went wrong. Please try again.';
  } finally {
    thinkEl.remove();
    if (!reply || !reply.trim()) reply = 'No response received. Please try again.';
    renderMsg('ai', reply);
    saveMsg('ai', reply);
    const stored = webCtx ? text + '\n\n[context:\n' + webCtx + ']' : text;
    history.push({ role:'user',  parts:[{ text: stored }] });
    history.push({ role:'model', parts:[{ text: reply  }] });
    if (history.length > 40) history = history.slice(-40);
    isTyping = false;
    document.getElementById('send-btn').disabled = false;
    inp.focus();
  }
};

/* ── Gemini API call ─────────────────────────────────────── */
async function callGemini(userText, webCtx, complex) {
  webCtx  = webCtx  || '';
  complex = !!complex;
  const today = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const sysMsg = 'You are Blue AI 1.4, a smart and friendly AI assistant. Answer in the same language the user writes in (English or German). Be clear, helpful and accurate. Use markdown where appropriate. Today: ' + today + '.';
  const full = webCtx ? userText + '\n\n[Web context:\n' + webCtx + ']' : userText;
  const ctxSlice = (complex ? history : history.slice(-6)).filter(function(m){ return m && m.parts && m.parts[0] && m.parts[0].text; });

  const contents = [
    { role:'user',  parts:[{ text: sysMsg }] },
    { role:'model', parts:[{ text: 'Understood. I am Blue AI 1.4.' }] }
  ].concat(ctxSlice).concat([{ role:'user', parts:[{ text: full }] }]);

  const res = await fetch(G_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: contents,
      generationConfig: {
        temperature: complex ? 0.72 : 0.6,
        maxOutputTokens: complex ? 2048 : 800
      }
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const txt = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text;
  if (!txt || !txt.trim()) throw new Error('Empty response from API');
  return txt;
}

/* ── Web search via Gemini grounding ────────────────────── */
async function doWebSearch(query) {
  const sd = document.createElement('div');
  sd.className = 'srch-bar';
  sd.innerHTML = `<div class="srch-spin"></div> Searching for current information…`;
  document.getElementById('chat-area').appendChild(sd);
  scrollToBottom(false);
  try {
    const res  = await fetch(G_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{role:'user',parts:[{text:`Search for and summarize current information about: ${query}\nKeep the summary factual and under 280 words.`}]}],
        tools:[{ google_search:{} }],
        generationConfig:{ temperature:0.2, maxOutputTokens:400 }
      })
    });
    const data = await res.json();
    sd.remove();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  } catch { sd.remove(); return ''; }
}

/* ── UI helpers ─────────────────────────────────────────── */
function renderMsg(role, content, animate = true) {
  const ca  = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `message ${role}${animate ? ' msg-anim' : ''}`;
  const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const ava = role === 'ai'
    ? `<div class="msg-avatar ai">✦</div>`
    : `<div class="msg-avatar user">${currentUser?.displayName?.charAt(0).toUpperCase() || '?'}</div>`;
  const bbl = `<div class="msg-bubble">${role === 'ai' ? md(content) : esc(content)}</div>`;
  div.innerHTML = `${ava}<div style="flex:1;min-width:0">${bbl}<div class="msg-meta">${time}</div></div>`;
  ca.appendChild(div);
  scrollToBottom(false);
}

function appendThinking() {
  const ca  = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'message ai msg-anim';
  div.innerHTML = `<div class="msg-avatar ai">✦</div><div class="thinking"><div class="th-dots"><div class="th-dot"></div><div class="th-dot"></div><div class="th-dot"></div></div><span class="th-label">Thinking…</span></div>`;
  ca.appendChild(div);
  scrollToBottom(false);
  return div;
}

function showChat() {
  if (chatActive) return;
  chatActive = true;
  const wp = document.getElementById('welcome-panel');
  wp.classList.add('hidden');
}

function showWelcome() {
  const wp = document.getElementById('welcome-panel');
  wp.classList.remove('hidden');
}

/* ── Scroll management ──────────────────────────────────── */
window.scrollToBottom = (smooth = true) => {
  const el = document.getElementById('chat-scroll');
  if (smooth) {
    el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
  } else {
    el.scrollTop = el.scrollHeight;
  }
  document.getElementById('scroll-btn').classList.remove('visible');
};

// Show/hide scroll-to-bottom button
document.getElementById('chat-scroll').addEventListener('scroll', () => {
  const el = document.getElementById('chat-scroll');
  const fromBottom = el.scrollHeight - el.scrollTop - el.clientHeight;
  const btn = document.getElementById('scroll-btn');
  if (fromBottom > 120) {
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
});

/* ── Markdown ───────────────────────────────────────────── */
function md(t) {
  let h = t;
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_,l,c) => `<pre><code>${esc(c.trim())}</code></pre>`);
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g,    '<em>$1</em>');
  h = h.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/^\d+\. (.+)$/gm,  '<li>$1</li>');
  h = h.replace(/^---$/gm, '<hr>');
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  h = h.split('\n\n').map(p => {
    p = p.trim();
    if (!p || p.startsWith('<')) return p;
    return `<p>${p.replace(/\n/g,'<br>')}</p>`;
  }).join('');
  return h;
}

function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ── Input handlers ─────────────────────────────────────── */
window.handleKey = e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} };
window.onInput   = el => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 180) + 'px';
  updateCC(el);
};
function updateCC(el) {
  const n  = el.value.length;
  const cc = document.getElementById('char-c');
  cc.textContent = `${n} / 4000`;
  cc.className   = 'char-c' + (n > 3600 ? ' warn' : '') + (n >= 4000 ? ' over' : '');
  document.getElementById('send-btn').disabled = n === 0 || isTyping;
}
</script>
