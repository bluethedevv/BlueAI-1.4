<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue AI 1.4</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bd: #070c1a;
  --ba: #1a6fff;
  --bl: #4d9fff;
  --bu: #00c3ff;
  --bg2: #2d7fff;
  --gb: rgba(255,255,255,.055);
  --gbr: rgba(255,255,255,.10);
  --tp: #eef2ff;
  --ts: rgba(190,210,255,.72);
  --tm: rgba(140,165,215,.5);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bd);color:var(--tp);display:flex;flex-direction:column;height:100vh}

/* bg */
.bg-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-mesh::before{content:'';position:absolute;width:900px;height:900px;background:radial-gradient(circle,rgba(26,111,255,.15) 0%,transparent 65%);top:-250px;left:-250px;animation:o1 22s ease-in-out infinite}
.bg-mesh::after{content:'';position:absolute;width:700px;height:700px;background:radial-gradient(circle,rgba(0,195,255,.09) 0%,transparent 65%);bottom:-150px;right:-150px;animation:o2 28s ease-in-out infinite}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(77,159,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(77,159,255,.025) 1px,transparent 1px);background-size:40px 40px}
@keyframes o1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(130px,80px) scale(1.15)}66%{transform:translate(-60px,160px) scale(.92)}}
@keyframes o2{0%,100%{transform:translate(0,0)}40%{transform:translate(-90px,-60px) scale(1.2)}70%{transform:translate(45px,-120px) scale(.88)}}

/* AUTH */
#auth-screen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(7,12,26,.94);backdrop-filter:blur(24px)}
.acard{width:100%;max-width:420px;padding:42px 38px;border-radius:26px;background:rgba(12,22,52,.78);border:1px solid rgba(77,159,255,.16);box-shadow:0 36px 90px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.065);backdrop-filter:blur(44px) saturate(170%)}
.alogo{display:flex;align-items:center;gap:13px;margin-bottom:30px}
.alogo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--ba),var(--bu));border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 0 26px rgba(26,111,255,.52),inset 0 1px 0 rgba(255,255,255,.22)}
.alogo-name{font-size:19px;font-weight:600;letter-spacing:-.3px;background:linear-gradient(90deg,#fff,var(--bu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.alogo-ver{font-size:11px;color:var(--tm);font-family:'Space Mono',monospace;letter-spacing:1px;margin-top:1px}
.ah{font-size:23px;font-weight:600;margin-bottom:6px}
.asub{font-size:14px;color:var(--ts);margin-bottom:26px;font-weight:300}
.afield{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.afield label{font-size:11px;color:var(--ts);letter-spacing:.6px;font-weight:600;text-transform:uppercase}
.ainput{padding:12px 15px;border-radius:13px;border:1px solid rgba(77,159,255,.16);background:rgba(255,255,255,.038);color:var(--tp);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:all .2s;width:100%}
.ainput:focus{border-color:rgba(26,111,255,.52);background:rgba(26,111,255,.065);box-shadow:0 0 0 3px rgba(26,111,255,.13)}
.ainput::placeholder{color:var(--tm)}
.abtn{width:100%;padding:14px;border-radius:15px;border:none;background:linear-gradient(135deg,var(--ba),var(--bg2));color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .22s;font-family:'DM Sans',sans-serif;box-shadow:0 7px 22px rgba(26,111,255,.42);margin-top:6px}
.abtn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 30px rgba(26,111,255,.58)}
.abtn:disabled{opacity:.48;cursor:not-allowed;transform:none}
.aerr{min-height:18px;font-size:13px;color:#ff7878;margin-top:10px;text-align:center}
.atog{text-align:center;margin-top:20px;font-size:13.5px;color:var(--ts)}
.atog a{color:var(--bl);cursor:pointer;font-weight:500;text-decoration:none}
.atog a:hover{color:var(--bu)}

/* APP */
#app-screen{display:none;flex-direction:column;height:100vh;overflow:hidden;position:relative;z-index:1}

/* header */
header{flex-shrink:0;z-index:10;padding:13px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,12,26,.82);backdrop-filter:blur(32px);border-bottom:1px solid rgba(77,159,255,.09)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--ba),var(--bu));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 18px rgba(26,111,255,.44),inset 0 1px 0 rgba(255,255,255,.2)}
.logo-name{font-size:16px;font-weight:600;letter-spacing:-.3px;background:linear-gradient(90deg,#fff,var(--bu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.logo-ver{font-size:10px;color:var(--tm);font-family:'Space Mono',monospace;letter-spacing:1px}
.hdr-r{display:flex;align-items:center;gap:10px}
.spill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;color:var(--ts);background:rgba(0,255,100,.065);border:1px solid rgba(0,255,100,.16)}
.sdot{width:6px;height:6px;border-radius:50%;background:#00ff88;box-shadow:0 0 8px #00ff88;animation:pulse 2.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px #00ff88}50%{opacity:.55;box-shadow:0 0 4px #00ff88}}
.uchip{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 5px;border-radius:20px;background:var(--gb);border:1px solid var(--gbr);backdrop-filter:blur(14px)}
.uava{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--ba),var(--bu));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.uname{font-size:12px;color:var(--ts)}
.hbtn{padding:6px 14px;border-radius:20px;border:1px solid var(--gbr);background:var(--gb);color:var(--ts);font-size:12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;backdrop-filter:blur(12px)}
.hbtn:hover{border-color:rgba(255,80,80,.38);color:#ff8888;background:rgba(255,50,50,.07)}
.hbtn.clr:hover{border-color:rgba(77,159,255,.4);color:var(--bl);background:rgba(26,111,255,.08)}

/* main */
main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* welcome */
#welcome-panel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:10px;transition:opacity .38s,transform .38s;pointer-events:auto}
#welcome-panel.hidden{opacity:0;transform:translateY(-14px);pointer-events:none}
.gbadge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;background:rgba(26,111,255,.09);border:1px solid rgba(26,111,255,.22);font-size:11px;color:var(--bl);font-family:'Space Mono',monospace;letter-spacing:.6px;margin-bottom:14px}
.wh{font-size:clamp(24px,4.5vw,48px);font-weight:300;line-height:1.18;letter-spacing:-1.2px;text-align:center;margin-bottom:10px}
.wh strong{font-weight:600;background:linear-gradient(135deg,var(--bl),var(--bu),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wsub{font-size:14.5px;color:var(--ts);font-weight:300;text-align:center}

/* chat scroll */
#chat-scroll{flex:1;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:rgba(77,159,255,.22) transparent}
#chat-scroll::-webkit-scrollbar{width:4px}
#chat-scroll::-webkit-scrollbar-track{background:transparent}
#chat-scroll::-webkit-scrollbar-thumb{background:rgba(77,159,255,.22);border-radius:4px}
#chat-scroll::-webkit-scrollbar-thumb:hover{background:rgba(77,159,255,.38)}
#chat-area{display:flex;flex-direction:column;gap:18px;padding:22px max(16px,calc(50% - 400px)) 10px;min-height:100%}

/* scroll btn */
#scroll-btn{position:absolute;bottom:14px;right:max(20px,calc(50% - 420px));width:34px;height:34px;border-radius:50%;background:rgba(26,111,255,.7);border:1px solid rgba(77,159,255,.35);color:#fff;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(26,111,255,.4);transition:opacity .2s,transform .2s;z-index:20;backdrop-filter:blur(10px)}
#scroll-btn:hover{transform:scale(1.1)}
#scroll-btn.show{display:flex}

/* messages */
.msg{display:flex;gap:12px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg.anim{animation:mIn .3s cubic-bezier(.16,1,.3,1) both}
@keyframes mIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.mava{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;margin-top:2px}
.mava.ai{background:linear-gradient(135deg,var(--ba),var(--bu));box-shadow:0 0 14px rgba(26,111,255,.38)}
.mava.user{background:rgba(255,255,255,.1);border:1px solid var(--gbr);font-size:13px;font-weight:700;color:var(--bu)}
.mbub{max-width:78%;padding:13px 17px;border-radius:18px;line-height:1.68;font-size:15px}
.msg.user .mbub{background:linear-gradient(135deg,rgba(26,111,255,.22),rgba(0,195,255,.12));border:1px solid rgba(26,111,255,.26);border-top-right-radius:4px;backdrop-filter:blur(12px)}
.msg.ai .mbub{background:rgba(255,255,255,.046);border:1px solid rgba(255,255,255,.088);border-top-left-radius:4px;backdrop-filter:blur(20px);box-shadow:0 4px 22px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.052)}
.mbub p{margin-bottom:9px}.mbub p:last-child{margin-bottom:0}
.mbub strong{color:var(--bl);font-weight:600}
.mbub em{color:var(--ts)}
.mbub h1,.mbub h2,.mbub h3{margin:13px 0 7px;color:var(--tp)}
.mbub h2{font-size:17px}.mbub h3{font-size:15px}
.mbub code{font-family:'Space Mono',monospace;font-size:12.5px;background:rgba(26,111,255,.14);padding:2px 7px;border-radius:5px;color:var(--bu)}
.mbub pre{background:rgba(0,0,0,.32);border:1px solid rgba(77,159,255,.13);border-radius:11px;padding:15px;margin:11px 0;overflow-x:auto}
.mbub pre code{background:none;padding:0;color:#a8d8ff;font-size:12.5px}
.mbub ul,.mbub ol{padding-left:22px;margin:8px 0}
.mbub li{margin-bottom:5px}
.mbub hr{border:none;border-top:1px solid rgba(77,159,255,.13);margin:13px 0}
.mbub a{color:var(--bu);text-decoration:none}.mbub a:hover{text-decoration:underline}
.mmeta{font-size:11px;color:var(--tm);margin-top:5px;font-family:'Space Mono',monospace}
.msg.user .mmeta{text-align:right}

/* thinking */
.thinking{display:flex;align-items:center;gap:10px;padding:13px 17px;border-radius:18px;border-top-left-radius:4px;background:rgba(255,255,255,.046);border:1px solid rgba(255,255,255,.088);backdrop-filter:blur(20px)}
.tdots{display:flex;gap:5px}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--ba);animation:dp 1.4s ease-in-out infinite}
.tdot:nth-child(2){animation-delay:.18s}.tdot:nth-child(3){animation-delay:.36s}
@keyframes dp{0%,60%,100%{transform:scale(.68);opacity:.38}30%{transform:scale(1.08);opacity:1}}
.tlbl{font-size:13px;color:var(--tm)}

/* search bar */
.sbar{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:11px;background:rgba(0,195,255,.055);border:1px solid rgba(0,195,255,.13);font-size:13px;color:var(--bu);animation:fup .3s ease}
@keyframes fup{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.sspin{width:13px;height:13px;border:2px solid rgba(0,195,255,.28);border-top-color:var(--bu);border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* input area */
.iarea{flex-shrink:0;position:relative;z-index:10;padding:10px max(16px,calc(50% - 416px)) 18px;background:linear-gradient(transparent,rgba(7,12,26,.97) 30%)}
.wbar{display:none;align-items:center;gap:8px;padding:7px 14px;background:rgba(0,195,255,.055);border:1px solid rgba(0,195,255,.14);border-radius:11px;margin-bottom:8px;font-size:12px;color:var(--bu)}
.wbar.on{display:flex}
.ibox{border-radius:20px;border:1px solid rgba(77,159,255,.18);background:rgba(10,18,50,.74);backdrop-filter:blur(32px) saturate(200%);box-shadow:0 0 0 1px rgba(0,0,0,.28),0 22px 58px rgba(0,0,255,.08),inset 0 1px 0 rgba(255,255,255,.065);transition:border-color .22s,box-shadow .22s;overflow:hidden}
.ibox:focus-within{border-color:rgba(26,111,255,.46);box-shadow:0 0 0 1px rgba(0,0,0,.28),0 22px 58px rgba(26,111,255,.17),0 0 38px rgba(26,111,255,.09),inset 0 1px 0 rgba(255,255,255,.088)}
.itop{display:flex;align-items:flex-end;gap:10px;padding:14px 15px 9px}
#user-input{flex:1;background:none;border:none;outline:none;color:var(--tp);font-family:'DM Sans',sans-serif;font-size:15.5px;font-weight:400;resize:none;max-height:180px;line-height:1.52;min-height:27px}
#user-input::placeholder{color:var(--tm)}
.sbtn{width:37px;height:37px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--ba),var(--bg2));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0;box-shadow:0 4px 15px rgba(26,111,255,.42)}
.sbtn:hover:not(:disabled){transform:scale(1.07);box-shadow:0 6px 22px rgba(26,111,255,.62)}
.sbtn:disabled{opacity:.32;cursor:not-allowed;transform:none}
.ibot{display:flex;align-items:center;justify-content:space-between;padding:3px 15px 12px}
.itools{display:flex;gap:3px}
.tbtn{padding:5px 11px;border-radius:8px;border:none;background:transparent;color:var(--tm);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif}
.tbtn:hover{background:rgba(255,255,255,.05);color:var(--ts)}
.tbtn.on{background:rgba(26,111,255,.12);color:var(--bl);border:1px solid rgba(26,111,255,.22)}
.cc{font-size:11px;color:var(--tm);font-family:'Space Mono',monospace}
.cc.warn{color:#ff9500}.cc.over{color:#ff4040}

@media(max-width:600px){
  header{padding:11px 14px}
  .iarea{padding:10px 12px 16px}
  .mbub{max-width:90%;font-size:14.5px}
}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="acard">
    <div class="alogo">
      <div class="alogo-icon">✦</div>
      <div>
        <div class="alogo-name">Blue AI</div>
        <div class="alogo-ver">v1.4</div>
      </div>
    </div>
    <h2 class="ah" id="auth-h">Create Account</h2>
    <p class="asub">Your personal AI assistant</p>
    <div class="afield" id="urow">
      <label>Username</label>
      <input class="ainput" id="f-u" type="text" placeholder="Choose a username" autocomplete="off"/>
    </div>
    <div class="afield">
      <label>Email</label>
      <input class="ainput" id="f-e" type="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="afield">
      <label>Password</label>
      <input class="ainput" id="f-p" type="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')submitAuth()"/>
    </div>
    <p class="aerr" id="aerr"></p>
    <button class="abtn" id="abtn" onclick="submitAuth()">Create Account</button>
    <p class="atog">
      <span id="ttxt">Already have an account?</span>
      <a onclick="toggleMode()" id="tlnk"> Sign in</a>
    </p>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div>
        <div class="logo-name">Blue AI</div>
        <div class="logo-ver">v1.4</div>
      </div>
    </div>
    <div class="hdr-r">
      <div class="spill"><div class="sdot"></div>Online</div>
      <div class="uchip">
        <div class="uava" id="u-ava">?</div>
        <span class="uname" id="u-nm">User</span>
      </div>
      <button class="hbtn clr" onclick="clearChat()">Clear</button>
      <button class="hbtn" onclick="doLogout()">Sign out</button>
    </div>
  </header>

  <main>
    <div id="welcome-panel">
      <div class="gbadge">✦ BLUE AI 1.4</div>
      <h1 class="wh">Hey <span id="gname">there</span>,<br><strong>what can I do for you today?</strong></h1>
      <p class="wsub">Ask me anything.</p>
    </div>

    <div id="chat-scroll">
      <div id="chat-area"></div>
    </div>

    <button id="scroll-btn" onclick="scrollBot(true)" title="Scroll to bottom">↓</button>
  </main>

  <div class="iarea">
    <div class="wbar" id="wbar">🌐 Web Search on — I'll look up current info</div>
    <div class="ibox">
      <div class="itop">
        <textarea id="user-input" rows="1" placeholder="Ask anything…"
          onkeydown="handleKey(event)" oninput="onInp(this)"></textarea>
        <button class="sbtn" id="sbtn" onclick="sendMessage()" disabled>➤</button>
      </div>
      <div class="ibot">
        <div class="itools">
          <button class="tbtn" id="wbtn" onclick="toggleWeb()">🌐 Web</button>
        </div>
        <span class="cc" id="cc">0 / 4000</span>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
         onAuthStateChanged, signOut, updateProfile }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getDatabase, ref, set, get, push }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

// ── Firebase ────────────────────────────────────────────────
const fb = initializeApp({
  apiKey: "AIzaSyDVTzNgheVWiI13uQOYmAm0Gm_fB_bkR8w",
  authDomain: "blueai-fee62.firebaseapp.com",
  projectId: "blueai-fee62",
  storageBucket: "blueai-fee62.firebasestorage.app",
  messagingSenderId: "965285145335",
  appId: "1:965285145335:web:0cc41cd849e363d517c1f2",
  databaseURL: "https://blueai-fee62-default-rtdb.firebaseio.com"
});
const auth = getAuth(fb);
const db   = getDatabase(fb);

// ── Gemini ──────────────────────────────────────────────────
const GKEY = "AIzaSyBLNuDYTWyyzP5Q_ub7nJVSYDYg43Vc_Sw";
const GURL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + GKEY;

// ── State ───────────────────────────────────────────────────
let me        = null;
let hist      = [];
let busy      = false;
let webOn     = false;
let regMode   = true;
let chatOn    = false;

// ── Auth listener ───────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  me = user;
  if (user) {
    const n = user.displayName || user.email.split('@')[0];
    document.getElementById('gname').textContent  = n;
    document.getElementById('u-nm').textContent   = n;
    document.getElementById('u-ava').textContent  = n.charAt(0).toUpperCase();
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display  = 'flex';
    await loadHist(user.uid);
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display  = 'none';
  }
});

// ── Toggle register / login ─────────────────────────────────
window.toggleMode = () => {
  regMode = !regMode;
  document.getElementById('auth-h').textContent = regMode ? 'Create Account' : 'Welcome back';
  document.getElementById('abtn').textContent   = regMode ? 'Create Account' : 'Sign In';
  document.getElementById('ttxt').textContent   = regMode ? 'Already have an account?' : "Don't have an account?";
  document.getElementById('tlnk').textContent   = regMode ? ' Sign in' : ' Create one';
  document.getElementById('urow').style.display = regMode ? 'flex' : 'none';
  document.getElementById('aerr').textContent   = '';
};

// ── Submit auth ─────────────────────────────────────────────
window.submitAuth = async () => {
  const email = document.getElementById('f-e').value.trim();
  const pass  = document.getElementById('f-p').value;
  const uname = document.getElementById('f-u').value.trim();
  const err   = document.getElementById('aerr');
  err.textContent = '';
  if (!email || !pass)          { err.textContent = 'Please fill all fields.'; return; }
  if (regMode && !uname)        { err.textContent = 'Please enter a username.'; return; }
  if (regMode && pass.length<6) { err.textContent = 'Password needs 6+ characters.'; return; }
  const btn = document.getElementById('abtn');
  btn.disabled = true; btn.textContent = 'Please wait…';
  try {
    if (regMode) {
      const c = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(c.user, { displayName: uname });
      await set(ref(db, 'users/'+c.user.uid+'/profile'), { username: uname, email, createdAt: Date.now() });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch(e) {
    err.textContent = fmtErr(e.code);
    btn.disabled = false;
    btn.textContent = regMode ? 'Create Account' : 'Sign In';
  }
};

function fmtErr(c) {
  return ({'auth/invalid-email':'Invalid email.','auth/user-not-found':'No account found.',
    'auth/wrong-password':'Wrong password.','auth/email-already-in-use':'Email already registered.',
    'auth/weak-password':'Password too weak.','auth/invalid-credential':'Wrong email or password.',
    'auth/too-many-requests':'Too many attempts. Try later.',
    'auth/network-request-failed':'Network error.'})[c] || 'Something went wrong.';
}

// ── Logout ──────────────────────────────────────────────────
window.doLogout = async () => {
  hist = []; chatOn = false;
  document.getElementById('chat-area').innerHTML = '';
  document.getElementById('welcome-panel').classList.remove('hidden');
  await signOut(auth);
};

// ── Firebase chat history ───────────────────────────────────
async function loadHist(uid) {
  const snap = await get(ref(db, 'users/'+uid+'/chats'));
  if (!snap.exists()) return;
  const entries = Object.values(snap.val()).sort((a,b) => a.ts-b.ts).slice(-40);
  hist = [];
  document.getElementById('chat-area').innerHTML = '';
  for (const e of entries) {
    hist.push({ role: e.role==='ai'?'model':'user', parts:[{ text: e.content }] });
    renderMsg(e.role, e.content, false);
  }
  if (entries.length > 0) { openChat(); scrollBot(false); }
}

function saveMsg(role, content) {
  if (!me) return;
  push(ref(db, 'users/'+me.uid+'/chats'), { role, content, ts: Date.now() });
}

// ── Clear ───────────────────────────────────────────────────
window.clearChat = () => {
  hist = []; chatOn = false;
  document.getElementById('chat-area').innerHTML = '';
  document.getElementById('welcome-panel').classList.remove('hidden');
  if (me) set(ref(db, 'users/'+me.uid+'/chats'), null);
};

// ── Web toggle ──────────────────────────────────────────────
window.toggleWeb = () => {
  webOn = !webOn;
  document.getElementById('wbtn').classList.toggle('on', webOn);
  document.getElementById('wbar').classList.toggle('on', webOn);
};

// ── Send ────────────────────────────────────────────────────
window.sendMessage = async () => {
  const inp  = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text || busy) return;

  busy = true;
  document.getElementById('sbtn').disabled = true;
  inp.value = ''; inp.style.height = 'auto'; updCC(inp);

  openChat();
  renderMsg('user', text);
  saveMsg('user', text);

  const thk = mkThinking();
  let reply = '', ctx = '';

  try {
    const needWeb = webOn || /news|today|current|latest|2025|2026|weather|price|stock|who won|just happened/i.test(text);
    if (needWeb) {
      thk.querySelector('.tlbl').textContent = 'Searching…';
      ctx = await webSearch(text);
    }
    const complex = text.length > 60 ||
      /explain|how does|difference|compare|analyz|write|code|debug|research|summar|step by step|in detail|pros|cons|why|when|who is|what happened|history/i.test(text);
    reply = await askGemini(text, ctx, complex);
  } catch(e) {
    console.error('sendMessage error:', e);
    reply = 'Error: ' + (e.message || 'Something went wrong. Please try again.');
  } finally {
    thk.remove();
    if (!reply || !reply.trim()) reply = 'No response received. Please try again.';
    renderMsg('ai', reply);
    saveMsg('ai', reply);
    const stored = ctx ? text+'\n\n[context:\n'+ctx+']' : text;
    hist.push({ role:'user',  parts:[{ text: stored }] });
    hist.push({ role:'model', parts:[{ text: reply  }] });
    if (hist.length > 40) hist = hist.slice(-40);
    busy = false;
    document.getElementById('sbtn').disabled = false;
    inp.focus();
  }
};

// ── Gemini call ───────────────────────────────────────────
async function askGemini(userText, ctx, complex) {
  const today = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const sys   = 'You are Blue AI 1.4, a helpful AI assistant. Answer in the same language the user writes (English or German). Be clear and accurate. Use markdown where helpful. Today: '+today+'.';
  const full  = ctx ? userText+'\n\n[Web context:\n'+ctx+']' : userText;
  const slice = (complex ? hist : hist.slice(-6)).filter(function(m){ return m&&m.parts&&m.parts[0]&&m.parts[0].text; });

  const body = JSON.stringify({
    system_instruction: { parts: [{ text: sys }] },
    contents: slice.concat([{ role:'user', parts:[{ text: full }] }]),
    generationConfig: { temperature: complex?0.72:0.6, maxOutputTokens: complex?2048:800 }
  });

  const res  = await fetch(GURL, { method:'POST', headers:{'Content-Type':'application/json'}, body: body });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const txt = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text;
  if (!txt || !txt.trim()) throw new Error('Empty response');
  return txt;
}

// ── Web search ──────────────────────────────────────────────
async function webSearch(query) {
  const sd = document.createElement('div');
  sd.className = 'sbar';
  sd.innerHTML = '<div class="sspin"></div> Searching…';
  document.getElementById('chat-area').appendChild(sd);
  scrollBot(false);
  try {
    const res  = await fetch(GURL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{role:'user',parts:[{text:'Search and summarize current info about: '+query+'\nKeep it factual, under 280 words.'}]}],
        tools:[{google_search:{}}],
        generationConfig:{temperature:0.2,maxOutputTokens:400}
      })
    });
    const data = await res.json();
    sd.remove();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  } catch { sd.remove(); return ''; }
}

// ── Render message ──────────────────────────────────────────
function renderMsg(role, content, animate=true) {
  const ca  = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg '+role+(animate?' anim':'');
  const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const ava  = role==='ai'
    ? '<div class="mava ai">✦</div>'
    : '<div class="mava user">'+(me?.displayName?.charAt(0).toUpperCase()||'?')+'</div>';
  const bbl  = '<div class="mbub">'+(role==='ai'?mdRender(content):esc(content))+'</div>';
  div.innerHTML = ava+'<div style="flex:1;min-width:0">'+bbl+'<div class="mmeta">'+time+'</div></div>';
  ca.appendChild(div);
  scrollBot(false);
}

function mkThinking() {
  const ca  = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg ai anim';
  div.innerHTML = '<div class="mava ai">✦</div><div class="thinking"><div class="tdots"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div><span class="tlbl">Thinking…</span></div>';
  ca.appendChild(div);
  scrollBot(false);
  return div;
}

function openChat() {
  if (chatOn) return;
  chatOn = true;
  document.getElementById('welcome-panel').classList.add('hidden');
}

// ── Scroll ──────────────────────────────────────────────────
window.scrollBot = (smooth=true) => {
  const el = document.getElementById('chat-scroll');
  if (smooth) el.scrollTo({top:el.scrollHeight,behavior:'smooth'});
  else        el.scrollTop = el.scrollHeight;
  document.getElementById('scroll-btn').classList.remove('show');
};

document.getElementById('chat-scroll').addEventListener('scroll', () => {
  const el  = document.getElementById('chat-scroll');
  const gap = el.scrollHeight - el.scrollTop - el.clientHeight;
  document.getElementById('scroll-btn').classList.toggle('show', gap > 120);
});

// ── Markdown ─────────────────────────────────────────────────
function mdRender(t) {
  let h = t;
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_,l,c) => '<pre><code>'+esc(c.trim())+'</code></pre>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm,  '<h1>$1</h1>');
  h = h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h = h.replace(/^[\*\-] (.+)$/gm,'<li>$1</li>');
  h = h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  h = h.replace(/^---$/gm,'<hr>');
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  h = h.split('\n\n').map(p=>{p=p.trim();if(!p||p.startsWith('<'))return p;return '<p>'+p.replace(/\n/g,'<br>')+'</p>';}).join('');
  return h;
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Input helpers ────────────────────────────────────────────
window.handleKey = e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} };
window.onInp = el => {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,180)+'px';
  updCC(el);
};
function updCC(el) {
  const n = el.value.length;
  const c = document.getElementById('cc');
  c.textContent = n+' / 4000';
  c.className = 'cc'+(n>3600?' warn':'')+(n>=4000?' over':'');
  document.getElementById('sbtn').disabled = n===0||busy;
}
</script>
